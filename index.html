*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:8px}
.wrap{max-width:1400px;margin:0 auto}
.header{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);margin-bottom:8px;flex-wrap:wrap}
.header h1{font-size:16px;font-weight:700;color:#f0f6fc}
.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;background:var(--panel2)}
.badge.live{color:var(--up);border:1px solid #2ea04340;background:#2ea04315}
.controls{display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.controls select,.controls button{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:4px 10px;border-radius:5px;font-size:11px;font-family:inherit;cursor:pointer}
.controls select:hover,.controls button:hover{border-color:var(--acc)}
.controls button.active{border-color:var(--acc);color:var(--acc);background:var(--panel)}
.controls .tog{padding:3px 8px;font-size:10px}
.chart-box{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:6px}
.chart-container{width:100%;height:400px}
.chart-container-sm{width:100%;height:130px}
.chart-wrapper{position:relative}
.info-bar{display:flex;gap:3px;margin-bottom:6px;flex-wrap:nowrap;overflow-x:auto}
.info-tile{background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:3px 7px;flex:0 0 auto;min-width:80px;white-space:nowrap}
.info-tile .lbl{font-size:8px;color:var(--mut);text-transform:uppercase;letter-spacing:.2px}
.info-tile .val{font-size:11px;font-weight:700;line-height:1.3}
.info-tile .val.g{color:var(--up)} .info-tile .val.r{color:var(--dn)} .info-tile .val.c{color:var(--gold)}
.status{font-size:10px;color:var(--mut);margin:4px 0;text-align:right}
#sharedCrosshair{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.25);pointer-events:none;display:none;z-index:50}
#sharedTooltip{position:absolute;top:3px;right:3px;background:rgba(11,14,19,0.88);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:3px 8px;font-size:9px;color:var(--txt);pointer-events:none;display:none;z-index:51;font-family:monospace;line-height:1.5;text-align:right}
#coinSearch{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:4px 8px;border-radius:5px;font-size:11px;width:120px;font-family:inherit}
#coinSearch:focus{outline:none;border-color:var(--acc)}
#coinList{max-height:300px;overflow-y:auto;position:absolute;top:100%;left:0;right:0;background:var(--panel);border:1px solid var(--line);border-radius:5px;display:none;z-index:100}
.coin-opt{padding:4px 8px;cursor:pointer;font-size:11px;display:flex;justify-content:space-between}
.coin-opt:hover{background:var(--panel2)}
.coin-opt .cp{color:var(--mut)}
.coin-opt.sel{border-left:2px solid var(--acc);color:var(--acc)}
.coin-wrap{position:relative;display:inline-block}
.ws-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px}
.ws-dot.on{background:var(--up);box-shadow:0 0 5px #2ea04380}
.ws-dot.off{background:var(--dn)}
</style>
</head>

function cdurCourt(c){let d15=dema(c,15),d30=dema(c,30),di=d15.map((x,i)=>x!=null&&d30[i]!=null?x-d30[i]:null);return rsiWild(dema(di,7),4)}

async function fetchData(coin, tf) {
  loading = true;
  const cfg = TF_CFG[tf];
  document.getElementById('candleInfo').textContent = 'Chargement ' + coin + ' ' + tf + '...';
  try {
    const now = Math.floor(Date.now());
    const start = now - cfg.hours * 3600 * 1000;
    const raw = await hl({type:"candleSnapshot", req:{coin, interval:tf, startTime:start, endTime:now}});
    const candles = raw.map(c => ({t:Math.floor(c.t/1000), o:+c.o, h:+c.h, l:+c.l, c:+c.c, v:+c.v||0}));
    candles.sort((a,b)=>a.t-b.t);
    return candles;
  } finally { loading = false; }
}

function toLine(arr, times) {
  // Garde la MEME longueur que les bougies (whitespace {time} en warmup) pour que
  // la synchro logique entre les 3 graphes reste alignee dans le temps (pas de decalage).
  return arr.map((v,i) => (v !== null && v !== undefined && v === v) ? {time:times[i], value:v} : {time:times[i]});
}

async function loadCoin(coin, tf) {
  activeCoin = coin; activeTF = tf;
  const candles = await fetchData(coin, tf);
  if (!candles.length) return;
  currentCandles = candles;
  const closes = candles.map(c => c.c);
  const times = candles.map(c => c.t);

  candleSeries.setData(candles.map(c => ({time:c.t, open:c.o, high:c.h, low:c.l, close:c.c})));
  volSeries.setData(candles.map(c => ({time:c.t, value:c.v, color:c.c>=c.o?'rgba(38,194,129,0.2)':'rgba(239,83,80,0.2)'})));

  const bb = boll(closes,20,2);
  bbU.setData(toLine(bb.u, times));
  bbM.setData(toLine(bb.m, times));
  bbL.setData(toLine(bb.l, times));
  const bb100 = boll(closes,100,2);
  bb100U.setData(toLine(bb100.u, times));
  bb100L.setData(toLine(bb100.l, times));
  sma10.setData(toLine(sma(closes,10), times));
  sma30.setData(toLine(sma(closes,30), times));
  sma600.setData(toLine(sma(closes,600), times));
  const cl = cdurLong(closes), cc = cdurCourt(closes), rs = rsiWild(closes,14);
  cdurL.setData(toLine(cl, times));
  cdurC.setData(toLine(cc, times));
  rsiS.setData(toLine(rs, times));

  const mk = MARKETS.find(m => m.name === coin) || {};
  const last = candles[candles.length-1];
  document.getElementById('infoBar').innerHTML =
    '<div class="info-tile"><div class="lbl">Prix</div><div class="val">$'+last.c.toLocaleString(undefined,{minimumFractionDigits:2})+ '</div></div>'+
    '<div class="info-tile"><div class="lbl">24h Vol</div><div class="val c">'+(mk.volume24h?'$'+(mk.volume24h/1e6).toFixed(1)+'M':'---')+'</div></div>'+
    '<div class="info-tile"><div class="lbl">Funding</div><div class="val '+(mk.funding>0?'g':mk.funding<0?'r':'')+'">'+(mk.funding!==undefined?(mk.funding>0?'+':'')+mk.funding.toFixed(4)+'%':'---')+'</div></div>'+
    '<div class="info-tile"><div class="lbl">OI</div><div class="val c">'+(mk.oi?'$'+(mk.oi*mk.price/1e6).toFixed(1)+'M':'---')+'</div></div>'+
    '<div class="info-tile"><div class="lbl">H/L</div><div class="val">$'+Math.max(...candles.map(c=>c.h)).toLocaleString()+' / $'+Math.min(...candles.map(c=>c.l)).toLocaleString()+'</div></div>';

  document.getElementById('candleInfo').textContent = candles.length + ' bougies - ' + tf + ' - ' + new Date().toLocaleString('fr-FR') + ' UTC+2';
  chart.timeScale().fitContent();
  cdurChart.timeScale().fitContent();
  rsiChart.timeScale().fitContent();
  setupCrosshairSync();
  connectWS();
}

function updateIndicatorsLive() {
  const now = Date.now();
  if (now - _lastIndUpd < 1000) return;   // throttle 1s
  _lastIndUpd = now;
  const closes = currentCandles.map(c=>c.c), times = currentCandles.map(c=>c.t);
  const upd = (s, arr) => { for (let i=arr.length-1;i>=0;i--){ if(arr[i]!=null&&arr[i]===arr[i]){ s.update({time:times[i],value:arr[i]}); break; } } };
  const bb=boll(closes,20,2); upd(bbU,bb.u); upd(bbM,bb.m); upd(bbL,bb.l);
  const b100=boll(closes,100,2); upd(bb100U,b100.u); upd(bb100L,b100.l);
  upd(sma10,sma(closes,10)); upd(sma30,sma(closes,30)); upd(sma600,sma(closes,600));
  upd(cdurL,cdurLong(closes)); upd(cdurC,cdurCourt(closes)); upd(rsiS,rsiWild(closes,14));
}

// === CROSSHAIR SYNC ===
function setupCrosshairSync() {
  const crosshairEl = document.getElementById('sharedCrosshair');
  const tooltipEl = document.getElementById('sharedTooltip');

  function showVals(time) {
    const cdl = currentCandles.find(c => c.t === time);
    if (!cdl) return;
    const i = currentCandles.findIndex(c => c.t === time);
    if (i<0) return;
    const closes = currentCandles.map(c=>c.c);
    const cl = cdurLong(closes), cc = cdurCourt(closes), rs = rsiWild(closes,14);
    const d = new Date(time*1000);
    const ds = d.toLocaleDateString('fr-FR',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'});
    let h = '<span style="color:#e6ebf5;font-size:10px">'+ds+'</span>';
    h += '<br><span style="color:#26c281">O:'+cdl.o.toFixed(0)+' H:'+cdl.h.toFixed(0)+' L:'+cdl.l.toFixed(0)+' C:'+cdl.c.toFixed(0)+'</span>';
    if (cl[i]!=null) h += '<br><span style="color:#f472b6">CDURL: '+cl[i].toFixed(1)+'</span>';
    if (cc[i]!=null) h += '<br><span style="color:#60a5fa">CDURc: '+cc[i].toFixed(1)+'</span>';
    if (rs[i]!=null) h += '<br><span style="color:#fbbf24">RSI14: '+rs[i].toFixed(1)+'</span>';
    tooltipEl.innerHTML = h;
  }

  function onMove(param) {
    if (!param.point || !param.time) { crosshairEl.style.display='none'; tooltipEl.style.display='none'; return; }
    crosshairEl.style.display='block'; crosshairEl.style.left=param.point.x+'px';
    tooltipEl.style.display='block'; showVals(param.time);
  }

  chart.subscribeCrosshairMove(onMove);
  if (cdurChart) cdurChart.subscribeCrosshairMove(onMove);
  if (rsiChart) rsiChart.subscribeCrosshairMove(onMove);

  const allCharts = [chart, cdurChart, rsiChart];
  allCharts.forEach((c,i) => {
    if (!c) return;
    c.timeScale().subscribeVisibleLogicalRangeChange((r) => {
      if (!r) return;
      allCharts.forEach((x,j) => { if (x && j!==i) x.timeScale().setVisibleLogicalRange(r); });
    });
  });
}

// === WEBSOCKET ===
function connectWS() {
  if (ws) try { ws.close(); } catch(e) {}
  try {
    ws = new WebSocket('wss://api.hyperliquid.xyz/ws');
    ws.onopen = () => {
      document.getElementById('wsDot').className='ws-dot on';
      document.getElementById('wsStatus').textContent='Connecte';
      ws.send(JSON.stringify({method:'subscribe',subscription:{type:'allMids',coin:activeCoin}}));
    };
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.channel === 'allMids' && msg.data?.mids?.[activeCoin]) {
          const mid = parseFloat(msg.data.mids[activeCoin]);
          if (mid && currentCandles.length > 0) {
            const last = currentCandles[currentCandles.length-1];
            const sec = (TF_CFG[activeTF]||{}).sec || 14400;
            const ct = Math.floor(Date.now()/1000/sec)*sec;
            if (last.t === ct) {
              last.h = Math.max(last.h, mid); last.l = Math.min(last.l, mid); last.c = mid;
              candleSeries.update({time:last.t, open:last.o, high:last.h, low:last.l, close:last.c});
              updateIndicatorsLive();
            }
          }
        }
      } catch(e) {}
    };
    ws.onclose = () => {
      document.getElementById('wsDot').className='ws-dot off';
      document.getElementById('wsStatus').textContent='Reconnexion...';
      setTimeout(connectWS, 3000);
    };
  } catch(e) { setTimeout(connectWS, 5000); }
}
